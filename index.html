<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simulasi Kelayakan Beasiswa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-1: #1a1028;
      --bg-2: #2d1b4e;
      --accent: #f472b6;
      --accent-2: #a78bfa;
      --accent-soft: rgba(244, 114, 182, 0.15);
      --text: #1e1b2e;
      --muted: #6b7280;
      --border: #fce7f3;
      --card: rgba(255, 255, 255, 0.94);
      --success: #16a34a;
      --success-bg: #f0fdf4;
      --success-border: #86efac;
      --danger: #dc2626;
      --danger-bg: #fef2f2;
      --danger-border: #fca5a5;
      --warn: #d97706;
      --warn-bg: #fffbeb;
      --warn-border: #fcd34d;
      --radius: 16px;
      --shadow: 0 24px 64px rgba(88, 28, 135, 0.35);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Zen Maru Gothic', 'DM Sans', system-ui, sans-serif;
      min-height: 100vh;
      color: var(--text);
      background: linear-gradient(145deg, var(--bg-1) 0%, #3b1d5c 45%, var(--bg-2) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      width: 420px;
      height: 420px;
      background: rgba(244, 114, 182, 0.35);
      top: -120px;
      right: -80px;
      animation: glowPulse 6s ease-in-out infinite;
    }

    body::after {
      width: 360px;
      height: 360px;
      background: rgba(167, 139, 250, 0.28);
      bottom: -100px;
      left: -60px;
      animation: glowPulse 8s ease-in-out infinite reverse;
    }

    @keyframes glowPulse {
      0%, 100% { opacity: 0.7; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.08); }
    }

    .sakura {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .sakura span {
      position: absolute;
      top: -10%;
      width: 12px;
      height: 12px;
      background: radial-gradient(circle at 30% 30%, #fce7f3, #f9a8d4);
      border-radius: 100% 0 100% 0;
      opacity: 0.75;
      animation: sakuraFall linear infinite;
    }

    .sakura span:nth-child(1) { left: 8%; animation-duration: 11s; animation-delay: 0s; }
    .sakura span:nth-child(2) { left: 18%; animation-duration: 14s; animation-delay: 1s; width: 10px; height: 10px; }
    .sakura span:nth-child(3) { left: 28%; animation-duration: 12s; animation-delay: 2s; }
    .sakura span:nth-child(4) { left: 42%; animation-duration: 16s; animation-delay: 0.5s; }
    .sakura span:nth-child(5) { left: 55%; animation-duration: 13s; animation-delay: 3s; width: 9px; height: 9px; }
    .sakura span:nth-child(6) { left: 68%; animation-duration: 15s; animation-delay: 1.5s; }
    .sakura span:nth-child(7) { left: 78%; animation-duration: 11s; animation-delay: 2.5s; }
    .sakura span:nth-child(8) { left: 88%; animation-duration: 17s; animation-delay: 0.8s; width: 11px; height: 11px; }

    @keyframes sakuraFall {
      0% { transform: translateY(0) rotate(0deg) translateX(0); opacity: 0; }
      10% { opacity: 0.8; }
      100% { transform: translateY(110vh) rotate(360deg) translateX(40px); opacity: 0; }
    }

    .layout {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.25rem;
      width: 100%;
      max-width: 820px;
      position: relative;
      z-index: 1;
    }

    .page {
      width: 100%;
      max-width: 460px;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.7s ease-out;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hero-banner {
      width: 100%;
      border-radius: 18px;
      margin-bottom: 1rem;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.25);
      border: 2px solid rgba(252, 231, 243, 0.35);
      display: block;
    }

    .mascot-wrap {
      display: none;
      flex-shrink: 0;
      animation: floatMascot 4s ease-in-out infinite;
    }

    .mascot-wrap img {
      width: 200px;
      filter: drop-shadow(0 16px 28px rgba(0, 0, 0, 0.35));
    }

    @keyframes floatMascot {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    @media (min-width: 768px) {
      .mascot-wrap { display: block; }
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #f9a8d4;
      background: rgba(244, 114, 182, 0.18);
      border: 1px solid rgba(249, 168, 212, 0.35);
      padding: 0.35rem 0.75rem;
      border-radius: 999px;
      margin-bottom: 1rem;
    }

    .card {
      background: var(--card);
      border-radius: 24px;
      padding: 2rem;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .header {
      margin-bottom: 1.75rem;
    }

    .header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.25;
      color: var(--text);
      margin-bottom: 0.35rem;
    }

    .header p {
      font-size: 0.9rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .criteria {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.65rem;
      margin-bottom: 1.75rem;
    }

    .criteria-item {
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
      padding: 0.75rem;
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.4;
    }

    .criteria-item strong {
      display: block;
      color: var(--text);
      font-size: 0.82rem;
      margin-bottom: 0.1rem;
    }

    .criteria-icon {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      color: #db2777;
      background: var(--accent-soft);
    }

    .field {
      margin-bottom: 1.1rem;
    }

    .field label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.45rem;
    }

    .field label span {
      font-weight: 500;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap .prefix {
      position: absolute;
      left: 0.85rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--muted);
      pointer-events: none;
    }

    .input-wrap input {
      width: 100%;
      padding: 0.8rem 0.9rem;
      padding-left: 2.5rem;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-family: inherit;
      font-size: 1rem;
      color: var(--text);
      background: #fff;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .field:not(.field-rp) .input-wrap input {
      padding-left: 0.9rem;
    }

    .input-wrap input::placeholder {
      color: #94a3b8;
    }

    .input-wrap input:hover {
      border-color: #cbd5e1;
    }

    .input-wrap input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-soft);
    }

    .btn-cek {
      width: 100%;
      margin-top: 0.5rem;
      padding: 0.9rem 1rem;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      background: linear-gradient(135deg, #ec4899 0%, #a855f7 100%);
      box-shadow: 0 8px 24px rgba(236, 72, 153, 0.4);
      transition: transform 0.15s, box-shadow 0.2s;
    }

    .btn-cek:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 28px rgba(236, 72, 153, 0.45);
    }

    .btn-cek:active {
      transform: translateY(0);
    }

    #hasil {
      margin-top: 1.25rem;
      padding: 1.1rem 1rem;
      border-radius: 14px;
      border: 1.5px dashed #cbd5e1;
      background: #f8fafc;
      text-align: center;
      transition: all 0.25s ease;
    }

    #hasil .status-mark {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin: 0 auto 0.6rem;
      display: block;
      background: #94a3b8;
    }

    #hasil.lolos .status-mark {
      background: var(--success);
    }

    #hasil.tidak-lolos .status-mark {
      background: var(--danger);
    }

    #hasil.warning .status-mark {
      background: var(--warn);
    }

    #hasil .hasil-text {
      font-size: 0.95rem;
      font-weight: 600;
      line-height: 1.45;
      color: #94a3b8;
    }

    #hasil .hasil-detail {
      margin-top: 0.35rem;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--muted);
    }

    #hasil.lolos {
      border-style: solid;
      border-color: var(--success-border);
      background: var(--success-bg);
    }

    #hasil.lolos .hasil-text {
      color: var(--success);
    }

    #hasil.tidak-lolos {
      border-style: solid;
      border-color: var(--danger-border);
      background: var(--danger-bg);
    }

    #hasil.tidak-lolos .hasil-text {
      color: var(--danger);
    }

    #hasil.warning {
      border-style: solid;
      border-color: var(--warn-border);
      background: var(--warn-bg);
    }

    #hasil.warning .hasil-text {
      color: var(--warn);
    }

    .footer-note {
      margin-top: 1.25rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--border);
      font-size: 0.78rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="sakura" aria-hidden="true">
    <span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span>
  </div>

  <div class="layout">
    <div class="mascot-wrap" aria-hidden="true">
      <img src="assets/hz64-mascot.png" alt="" />
    </div>

    <div class="page">
      <img class="hero-banner" src="assets/hz64-banner.png" alt="HZ64 Scholarship Assistant" />

      <div class="badge">HZ64 Scholarship Assistant</div>

    <div class="card">
      <header class="header">
        <h1>Simulasi Kelayakan Beasiswa</h1>
        <p>こんにちは! Masukkan IPK dan pendapatan orang tua untuk melihat rekomendasi pendaftaran.</p>
      </header>

      <div class="criteria">
        <div class="criteria-item">
          <div class="criteria-icon">IPK</div>
          <div>
            <strong>IPK minimal</strong>
            ≥ 3.30
          </div>
        </div>
        <div class="criteria-item">
          <div class="criteria-icon">Rp</div>
          <div>
            <strong>Pendapatan maks.</strong>
            ≤ Rp 5.000.000
          </div>
        </div>
      </div>

      <form id="formSimulasi" novalidate>
        <div class="field">
          <label for="ipk">
            Indeks Prestasi Kumulatif
            <span>0.00 – 4.00</span>
          </label>
          <div class="input-wrap">
            <input type="number" id="ipk" step="0.01" min="0" max="4" placeholder="Contoh: 3.40" inputmode="decimal" />
          </div>
        </div>

        <div class="field field-rp">
          <label for="pendapatan">
            Pendapatan Orang Tua
            <span>per bulan</span>
          </label>
          <div class="input-wrap">
            <span class="prefix">Rp</span>
            <input type="number" id="pendapatan" min="0" step="1000" placeholder="Contoh: 2.500.000" inputmode="numeric" />
          </div>
        </div>

        <button type="submit" class="btn-cek" id="btnCek">Cek Status Kelayakan</button>
      </form>

      <div id="hasil" role="status" aria-live="polite">
        <span class="status-mark" aria-hidden="true"></span>
        <div class="hasil-text">Hasil simulasi akan muncul di sini.</div>
      </div>

      <p class="footer-note">
        Powered by HZ64 Scholarship Bot &bull; AI Eligibility Checker
      </p>
    </div>
    </div>
  </div>

  <script>
    const IPK_MIN = 3.3;
    const PENDAPATAN_MAX = 5000000;

    const form = document.getElementById('formSimulasi');
    const ipkInput = document.getElementById('ipk');
    const pendapatanInput = document.getElementById('pendapatan');
    const hasil = document.getElementById('hasil');

    function formatRupiah(n) {
      return new Intl.NumberFormat('id-ID').format(n);
    }

    function setHasil(type, text, detail) {
      hasil.className = type;
      hasil.innerHTML =
        '<span class="status-mark" aria-hidden="true"></span>' +
        '<div class="hasil-text">' + text + '</div>' +
        (detail ? '<div class="hasil-detail">' + detail + '</div>' : '');
    }

    function cekKelayakan(e) {
      if (e) e.preventDefault();

      const ipk = parseFloat(ipkInput.value);
      const pendapatan = parseFloat(pendapatanInput.value);

      if (Number.isNaN(ipk) || Number.isNaN(pendapatan)) {
        setHasil('warning', 'Mohon isi IPK dan pendapatan dengan angka yang valid.');
        return;
      }

      const detail = 'IPK ' + ipk.toFixed(2) + ' · Pendapatan Rp ' + formatRupiah(pendapatan);

      if (ipk >= IPK_MIN && pendapatan <= PENDAPATAN_MAX) {
        setHasil(
          'lolos',
          'Rekomendasi: Anda Layak Mendaftar via Telegram @hz_64bot !',
          detail
        );
      } else {
        setHasil(
          'tidak-lolos',
          'Rekomendasi: Anda Tidak Memenuhi Syarat Beasiswa.',
          detail
        );
      }
    }

    form.addEventListener('submit', cekKelayakan);
  </script>
</body>
</html>
